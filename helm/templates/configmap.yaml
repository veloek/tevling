apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "tevling.fullname" . }}
  namespace: {{ include "tevling.fullname" . }}
  labels:
  {{- include "tevling.labels" . | nindent 4 }}
data:
  {{ .Values.appSettingsPath | base }}: |
    {
      "Serilog": {
        "MinimumLevel": {
          "Default": {{ .Values.logLevel | quote }},
        }
      },
      "FeatureManagement": {{ .Values.featureManagement | mustToPrettyJson | indent 6 }},
      "AdminIds": [ {{ join ", " .Values.adminIds }} ],
      "CultureByHost": {{ .Values.cultureByHost | mustToPrettyJson | indent 6 }}
    }
